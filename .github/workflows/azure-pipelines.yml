trigger:
- main

pool:
  name: Default

steps:

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet restore ClassLibrary2/ClassLibrary2.csproj
  displayName: Restore

- script: dotnet build ClassLibrary2/ClassLibrary2.csproj --configuration Release
  displayName: Build

- script: dotnet pack ClassLibrary2/ClassLibrary2.csproj --configuration Release -o $(Build.ArtifactStagingDirectory)
  displayName: Pack NuGet

- task: NuGetCommand@2
  inputs:
    command: 'push'
    packagesToPush: '$(Build.ArtifactStagingDirectory)/*.nupkg'
    publishVstsFeed: 'lab4-feed'
